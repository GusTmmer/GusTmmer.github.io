<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GusTmmer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #21262d;
      border: 2px solid #30363d;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }

    .handle {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 1.25rem;
    }

    .bio {
      font-size: 0.95rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid #30363d;
      color: #e6edf3;
      background: #21262d;
      transition: background 0.15s, border-color 0.15s;
    }

    .links a:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    .links a.primary {
      background: #238636;
      border-color: #2ea043;
    }

    .links a.primary:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>GusTmmer</h1>
    <p class="handle">@GusTmmer on GitHub</p>
    <p class="bio">Welcome to my page. I'll update this soon.</p>
    <div class="links">
      <a class="primary" href="https://github.com/GusTmmer">GitHub Profile</a>
    </div>
  </div>
</body>
</html>
